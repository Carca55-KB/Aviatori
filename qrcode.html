<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - Il Piccolo Principe</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e8d5b7;
            padding-top: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        nav .logo {
            color: #f4d03f;
            font-size: 1.2rem;
            font-weight: bold;
        }
        nav .nav-links {
            display: flex;
            gap: 25px;
        }
        nav .nav-links a {
            color: #e8d5b7;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        nav .nav-links a:hover {
            color: #f4d03f;
            background: rgba(244, 208, 63, 0.1);
        }
        nav .nav-links a.active {
            color: #f4d03f;
            background: rgba(244, 208, 63, 0.15);
        }
        .qr-container {
            margin-top: 50px;
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            border: 2px solid rgba(244, 208, 63, 0.3);
        }
        h1 {
            color: #f4d03f;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        .qr-code {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }
        .qr-code img {
            display: block;
        }
        .url-text {
            margin-top: 20px;
            color: #bb8fce;
            font-size: 1.1rem;
        }
        .download-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            background: rgba(244, 208, 63, 0.2);
            border: 2px solid #f4d03f;
            color: #f4d03f;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .download-btn:hover {
            background: #f4d03f;
            color: #1a1a2e;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Il Piccolo Principe</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="pilots.html">I sensi della volpe</a>
            <a href="webcam.html">Webcam</a>
            <a href="qrcode.html" class="active">QR Code</a>
        </div>
    </nav>
    
    <div class="qr-container">
        <h1>QR Code del Sito</h1>
        <div class="qr-code">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://aviatori.onrender.com/" alt="QR Code" width="250" height="250">
        </div>
        <p class="url-text">https://aviatori.onrender.com/</p>
        <a href="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https://aviatori.onrender.com/&download=1" class="download-btn" download="qrcode.png">Scarica QR Code</a>
    </div>
</body>
</html>
