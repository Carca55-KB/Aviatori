<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piloti F1 - Database</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e8d5b7;
        }
        header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0,0,0,0.2);
        }
        header h1 {
            font-size: 2.5rem;
            color: #f4d03f;
            margin-bottom: 10px;
        }
        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #bb8fce;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: #f4d03f;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .drivers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        .driver-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            border-left: 4px solid #f4d03f;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .driver-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.2);
        }
        .driver-number {
            font-size: 3rem;
            color: #e74c3c;
            font-weight: bold;
            float: right;
            opacity: 0.8;
        }
        .driver-card h3 {
            color: #f4d03f;
            margin-bottom: 10px;
            font-size: 1.4rem;
        }
        .driver-card .team {
            color: #bb8fce;
            font-style: italic;
            margin-bottom: 5px;
        }
        .driver-card .country {
            color: #888;
            font-size: 0.9rem;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #bb8fce;
            font-size: 1.2rem;
        }
        .error {
            text-align: center;
            padding: 50px;
            color: #e74c3c;
        }
        .stats-box {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        .stats-box span {
            color: #f4d03f;
            font-weight: bold;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Piloti F1 - Database</h1>
        <a href="index.html" class="back-link">← Torna alla home</a>
    </header>

    <div class="container">
        <div class="stats-box">
            Piloti nel database: <span id="driver-count">0</span>
        </div>
        <div id="drivers-container" class="drivers-grid">
            <div class="loading">Caricamento dati dal database...</div>
        </div>
    </div>

    <script>
        async function loadDrivers() {
            const container = document.getElementById('drivers-container');
            const countEl = document.getElementById('driver-count');
            
            try {
                const response = await fetch('/api/aviators');
                if (!response.ok) throw new Error('Errore nel caricamento');
                
                const drivers = await response.json();
                countEl.textContent = drivers.length;
                
                if (drivers.length === 0) {
                    container.innerHTML = '<div class="error">Nessun pilota trovato nel database</div>';
                    return;
                }
                
                container.innerHTML = drivers.map(driver => `
                    <div class="driver-card">
                        <div class="driver-number">#${driver.number}</div>
                        <h3>${driver.name}</h3>
                        <p class="team">${driver.team}</p>
                        <p class="country">Paese: ${driver.country}</p>
                    </div>
                `).join('');
                
            } catch (error) {
                container.innerHTML = `<div class="error">Errore: ${error.message}</div>`;
            }
        }
        
        loadDrivers();
    </script>
</body>
</html>
