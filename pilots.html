<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I sensi della volpe - Database</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e8d5b7;
            padding-top: 70px;
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        nav .logo {
            color: #f4d03f;
            font-size: 1.2rem;
            font-weight: bold;
        }
        nav .nav-links {
            display: flex;
            gap: 25px;
        }
        nav .nav-links a {
            color: #e8d5b7;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        nav .nav-links a:hover {
            color: #f4d03f;
            background: rgba(244, 208, 63, 0.1);
        }
        nav .nav-links a.active {
            color: #f4d03f;
            background: rgba(244, 208, 63, 0.15);
        }
        header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0,0,0,0.2);
        }
        header h1 {
            font-size: 2.5rem;
            color: #f4d03f;
            margin-bottom: 10px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .dropdown-container {
            margin-bottom: 30px;
        }
        .dropdown-container label {
            display: block;
            margin-bottom: 10px;
            color: #bb8fce;
            font-size: 1.1rem;
        }
        .dropdown-container select {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-family: 'Georgia', serif;
            background: rgba(255,255,255,0.1);
            border: 2px solid #f4d03f;
            border-radius: 10px;
            color: #e8d5b7;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
        }
        .dropdown-container select:hover {
            background: rgba(255,255,255,0.15);
        }
        .dropdown-container select option {
            background: #1a1a2e;
            color: #e8d5b7;
            padding: 10px;
        }
        .driver-details {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            border-left: 4px solid #f4d03f;
            display: none;
        }
        .driver-details.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .driver-details h2 {
            color: #f4d03f;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .driver-details .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .driver-details .info-label {
            color: #888;
        }
        .driver-details .info-value {
            color: #e8d5b7;
            font-weight: bold;
        }
        .driver-details .number-badge {
            display: inline-block;
            background: #e74c3c;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 1rem;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #bb8fce;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Il Piccolo Principe</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="pilots.html" class="active">I sensi della volpe</a>
            <a href="webcam.html">Webcam</a>
        </div>
    </nav>
    
    <header>
        <h1>I sensi della volpe</h1>
    </header>

    <div class="container">
        <div class="dropdown-container">
            <label for="driver-select">Seleziona un pilota:</label>
            <select id="driver-select">
                <option value="">-- Caricamento piloti... --</option>
            </select>
        </div>
        
        <div id="driver-details" class="driver-details">
            <h2 id="driver-name">Nome Pilota</h2>
            <div class="info-row">
                <span class="info-label">Numero</span>
                <span class="info-value"><span id="driver-number" class="number-badge">#1</span></span>
            </div>
            <div class="info-row">
                <span class="info-label">Team</span>
                <span id="driver-team" class="info-value">Team</span>
            </div>
            <div class="info-row">
                <span class="info-label">Paese</span>
                <span id="driver-country" class="info-value">Paese</span>
            </div>
        </div>
        
        <div id="loading" class="loading">Caricamento dati...</div>
    </div>

    <script>
        let drivers = [];
        
        async function loadDrivers() {
            const select = document.getElementById('driver-select');
            const details = document.getElementById('driver-details');
            const loading = document.getElementById('loading');
            
            try {
                const response = await fetch('/api/aviators');
                if (!response.ok) throw new Error('Errore nel caricamento');
                
                drivers = await response.json();
                
                select.innerHTML = '<option value="">-- Seleziona un pilota --</option>';
                drivers.forEach(driver => {
                    const option = document.createElement('option');
                    option.value = driver.id;
                    option.textContent = `${driver.name} (#${driver.number})`;
                    select.appendChild(option);
                });
                
                loading.style.display = 'none';
                
            } catch (error) {
                select.innerHTML = '<option value="">Errore nel caricamento</option>';
                loading.textContent = 'Errore: ' + error.message;
            }
        }
        
        document.getElementById('driver-select').addEventListener('change', function() {
            const details = document.getElementById('driver-details');
            const selectedId = this.value;
            
            if (!selectedId) {
                details.classList.remove('active');
                return;
            }
            
            const driver = drivers.find(d => d.id == selectedId);
            if (driver) {
                document.getElementById('driver-name').textContent = driver.name;
                document.getElementById('driver-number').textContent = '#' + driver.number;
                document.getElementById('driver-team').textContent = driver.team;
                document.getElementById('driver-country').textContent = driver.country;
                details.classList.add('active');
            }
        });
        
        loadDrivers();
    </script>
</body>
</html>
