<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Pianeti - Il Piccolo Principe</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #0b0b0c 0%, #1a0505 50%, #0b0b0c 100%);
            min-height: 100vh;
            color: #e8d5b7;
            padding-top: 70px;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(13, 17, 23, 0.95);
            padding: 18px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(232, 213, 183, 0.1);
        }
        nav .logo {
            color: #f4d03f;
            font-size: 1.2rem;
            font-weight: bold;
            position: absolute;
            left: 40px;
        }
        nav .nav-links {
            display: flex;
            gap: 25px;
            justify-content: center;
        }
        nav .nav-links a {
            color: #e8d5b7;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        nav .nav-links a:hover {
            color: #f4d03f;
            background: rgba(244, 208, 63, 0.1);
        }
        nav .nav-links a.active {
            color: #f4d03f;
            background: rgba(244, 208, 63, 0.15);
        }
        nav .nav-right {
            position: absolute;
            right: 40px;
        }
        nav .nav-right a {
            color: #e8d5b7;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        nav .nav-right a:hover {
            color: #f4d03f;
            background: rgba(244, 208, 63, 0.1);
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
            position: absolute;
            right: 20px;
        }
        .hamburger span {
            width: 25px;
            height: 3px;
            background: #f4d03f;
            border-radius: 3px;
            transition: all 0.3s;
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -6px);
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: rgba(13, 17, 23, 0.98);
            padding: 20px;
            flex-direction: column;
            gap: 10px;
            z-index: 999;
            border-bottom: 1px solid rgba(232, 213, 183, 0.1);
        }
        .mobile-menu.active {
            display: flex;
        }
        .mobile-menu a {
            color: #e8d5b7;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 15px 20px;
            border-radius: 10px;
            transition: all 0.3s;
            text-align: center;
        }
        .mobile-menu a:hover, .mobile-menu a.active {
            color: #f4d03f;
            background: rgba(244, 208, 63, 0.1);
        }
        @media (max-width: 768px) {
            nav {
                padding: 15px 20px;
                justify-content: flex-start;
            }
            nav .logo {
                position: static;
            }
            nav .nav-links, nav .nav-right {
                display: none;
            }
            .hamburger {
                display: flex;
            }
        }
        header {
            text-align: center;
            padding: 40px 20px 20px;
            position: relative;
            z-index: 1;
        }
        header h1 {
            font-size: 2.5rem;
            color: #f4d03f;
            margin-bottom: 10px;
        }
        header p {
            font-style: italic;
            color: #bb8fce;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .journey-graph {
            position: relative;
            width: 100%;
            height: 600px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border: 1px solid rgba(244, 208, 63, 0.2);
            overflow: hidden;
        }
        .journey-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .journey-line svg {
            width: 100%;
            height: 100%;
        }
        .journey-line path {
            stroke: rgba(244, 208, 63, 0.4);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 8, 4;
            animation: dash 20s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -1000; }
        }
        .planet-node {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
            text-align: center;
        }
        .planet-node:hover {
            transform: scale(1.15);
        }
        .planet-node img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid rgba(244, 208, 63, 0.5);
            filter: drop-shadow(0 0 15px rgba(244, 208, 63, 0.5));
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.3);
        }
        .planet-node:hover img {
            border-color: #f4d03f;
            filter: drop-shadow(0 0 25px rgba(244, 208, 63, 0.8));
        }
        .planet-node .node-number {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #f4d03f;
            color: #1a1a2e;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 0 2px 10px rgba(244, 208, 63, 0.5);
        }
        .planet-node .node-name {
            margin-top: 10px;
            color: #e8d5b7;
            font-size: 0.85rem;
            max-width: 130px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            line-height: 1.3;
        }
        .planet-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .planet-modal.active {
            display: flex;
        }
        .planet-modal-content {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.98) 0%, rgba(15, 52, 96, 0.98) 100%);
            border: 2px solid rgba(244, 208, 63, 0.5);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .planet-modal-content img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 4px solid rgba(244, 208, 63, 0.5);
            filter: drop-shadow(0 0 20px rgba(244, 208, 63, 0.5));
            object-fit: cover;
        }
        .planet-modal-content h2 {
            color: #f4d03f;
            font-size: 1.6rem;
            margin-bottom: 10px;
        }
        .planet-modal-content .planet-order {
            color: #bb8fce;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .planet-modal-content p {
            color: #e8d5b7;
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 20px;
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: #e8d5b7;
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.3s;
            line-height: 1;
        }
        .modal-close:hover {
            color: #f4d03f;
        }
        .legend {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            .journey-graph {
                height: 800px;
            }
            .planet-node img {
                width: 70px;
                height: 70px;
            }
            .planet-node .node-number {
                width: 24px;
                height: 24px;
                font-size: 0.75rem;
            }
            .planet-node .node-name {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <nav>
        <div class="logo">Il Piccolo Principe</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="pilots.html">Sensori</a>
            <a href="webcam.html">Webcam</a>
            <a href="pianeti.html" class="active">Pianeti</a>
            <a href="chi-siamo.html">Chi siamo</a>
        </div>
        <div class="nav-right">
            <a href="login.html">Login</a>
        </div>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>
    
    <div class="mobile-menu" id="mobile-menu">
        <a href="index.html">Home</a>
        <a href="pilots.html">Sensori</a>
        <a href="webcam.html">Webcam</a>
        <a href="pianeti.html">Pianeti</a>
        <a href="chi-siamo.html">Chi siamo</a>
        <a href="login.html">Login</a>
    </div>
    
    <header>
        <h1>I Pianeti</h1>
        <p>"Conobbe dunque molti pianeti abitati da grandi persone"</p>
    </header>

    <div class="container">
        <div class="journey-graph" id="journey-graph">
            <div class="journey-line">
                <svg id="connections-svg"></svg>
            </div>
        </div>
        <p class="legend">Clicca su un pianeta per scoprirne la storia</p>
    </div>

    <div class="planet-modal" id="planet-modal">
        <div class="planet-modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <img id="modal-img" src="" alt="Pianeta">
            <h2 id="modal-title"></h2>
            <p class="planet-order" id="modal-order"></p>
            <p id="modal-desc"></p>
        </div>
    </div>

    <script>
        const planetsData = [
            {
                id: 'asteroide',
                name: "L'Asteroide B-612",
                img: '121985_4-fotor-bg-remover-2026070817346.png',
                order: '1° pianeta - La partenza',
                desc: "Il piccolo pianeta d\'origine del Piccolo Principe, grande appena come una casa. Qui vive con la sua rosa e i suoi vulcani, osservando 44 tramonti al giorno quando è triste.",
                position: { x: 5, y: 50 }
            },
            {
                id: 're',
                name: "Il Pianeta del Re",
                img: '1pp-fotor-bg-remover-2026070912856.png',
                order: '2° pianeta',
                desc: "Un re senza sudditi che desidera solo essere obbedito. Ritiene di possedere le stelle perché le conta per prime, ma non ne trae alcun vantaggio.",
                position: { x: 18, y: 25 }
            },
            {
                id: 'vanitoso',
                name: "Il Pianeta del Vanitoso",
                img: 'vanitoso-removebg-preview-1.png',
                order: '3° pianeta',
                desc: "Un uomo che vuole essere ammirato da tutti ma non conosce nessun altro. Vive solo per gli applausi e considera gli altri come ammiratori.",
                position: { x: 32, y: 60 }
            },
            {
                id: 'ubriaco',
                name: "Il Pianeta dell'Ubriaco",
                img: '3pp-fotor-bg-remover-2026070912161.png',
                order: '4° pianeta',
                desc: "Un uomo che beve per dimenticare la vergogna di bere. Un circolo vizioso che il Piccolo Principe non riesce a comprendere.",
                position: { x: 46, y: 25 }
            },
            {
                id: 'uomo',
                name: "Il Pianeta dell'Uomo d'Affari",
                img: 'images-fotor-bg-remover-2026070912134.png',
                order: '5° pianeta',
                desc: "Un uomo troppo occupato a contare le stelle per possederle. Non ha tempo per le cose essenziali: l\'acqua, le stelle profumate, i fiori.",
                position: { x: 60, y: 60 }
            },
            {
                id: 'lampione',
                name: "Il Pianeta del Lampione",
                img: 'pngtree-venus-planet-isolated-on-white-background-png-image_20787579.png',
                order: '6° pianeta',
                desc: "Un uomo che accende e spegne il lampione ogni minuto perché il pianeta gira sempre più veloce. Esegue il suo compito con fedeltà, senza lamentarsi.",
                position: { x: 74, y: 25 }
            },
            {
                id: 'geografo',
                name: "Il Pianeta del Geografo",
                img: 'il-pianeta-del-geografo-removebg-preview-1.png',
                order: '7° pianeta',
                desc: "Uno scienziato che scrive libri di geografia ma non esplora mai. Insegna al Piccolo Principe che la sua rosa è effimera, spingendolo a cercare la Terra.",
                position: { x: 88, y: 55 }
            },
            {
                id: 'terra',
                name: "La Terra",
                img: 'earth-removebg-preview.png',
                order: '8° pianeta - L\'arrivo',
                desc: "Un pianeta con miliardi di persone, ma il Piccolo Principe si sente solo. Qui incontra la volpe, che gli insegna il segreto dell\'amicizia.",
                position: { x: 92, y: 80 }
            }
        ];

        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 2 + 's';
            starsContainer.appendChild(star);
        }

        const journeyGraph = document.getElementById('journey-graph');
        const svg = document.getElementById('connections-svg');
        const modal = document.getElementById('planet-modal');
        const modalImg = document.getElementById('modal-img');
        const modalTitle = document.getElementById('modal-title');
        const modalOrder = document.getElementById('modal-order');
        const modalDesc = document.getElementById('modal-desc');
        const modalClose = document.getElementById('modal-close');

        function createPlanets() {
            planetsData.forEach((planet, index) => {
                const node = document.createElement('div');
                node.className = 'planet-node';
                node.style.left = planet.position.x + '%';
                node.style.top = planet.position.y + '%';
                node.style.transform = 'translate(-50%, -50%)';
                
                node.innerHTML = `
                    <img src="${planet.img}" alt="${planet.name}">
                    <span class="node-number">${index + 1}</span>
                    <div class="node-name">${planet.name}</div>
                `;
                
                node.addEventListener('click', () => openModal(planet));
                journeyGraph.appendChild(node);
            });
        }

        function drawConnections() {
            const graphRect = journeyGraph.getBoundingClientRect();
            svg.setAttribute('viewBox', `0 0 ${graphRect.width} ${graphRect.height}`);
            
            let pathD = '';
            
            planetsData.forEach((planet, index) => {
                if (index < planetsData.length - 1) {
                    const x1 = (planet.position.x / 100) * graphRect.width;
                    const y1 = (planet.position.y / 100) * graphRect.height;
                    const x2 = (planetsData[index + 1].position.x / 100) * graphRect.width;
                    const y2 = (planetsData[index + 1].position.y / 100) * graphRect.height;
                    
                    const cx = (x1 + x2) / 2;
                    const cy = (y1 + y2) / 2 - 30;
                    
                    if (index === 0) {
                        pathD += `M ${x1} ${y1}`;
                    }
                    pathD += ` Q ${cx} ${cy} ${x2} ${y2}`;
                }
            });
            
            svg.innerHTML = `<path d="${pathD}"/>`;
        }

        function openModal(planet) {
            modalImg.src = planet.img;
            modalTitle.textContent = planet.name;
            modalOrder.textContent = planet.order;
            modalDesc.textContent = planet.desc;
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        modalClose.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        createPlanets();
        drawConnections();
        
        window.addEventListener('resize', drawConnections);

        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
        });
        
        document.addEventListener('click', (e) => {
            if (!hamburger.contains(e.target) && !mobileMenu.contains(e.target)) {
                hamburger.classList.remove('active');
                mobileMenu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
