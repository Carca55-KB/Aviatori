<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Pianeti - Il Piccolo Principe</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .sky-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('Starry-Sky-scaled-1-1536x1024.jpg') center center / cover no-repeat;
            z-index: -2;
            transition: opacity 1s ease;
        }
        .sky-bg.dimmed {
            opacity: 0.3;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        nav .logo {
            color: #f4d03f;
            font-size: 1.2rem;
            font-weight: bold;
            position: absolute;
            left: 40px;
        }
        nav .nav-links {
            display: flex;
            gap: 25px;
            justify-content: center;
        }
        nav .nav-links a {
            color: #e8d5b7;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        nav .nav-links a:hover {
            color: #f4d03f;
            background: rgba(244, 208, 63, 0.1);
        }
        nav .nav-links a.active {
            color: #f4d03f;
            background: rgba(244, 208, 63, 0.15);
        }
        nav .nav-right {
            position: absolute;
            right: 40px;
        }
        nav .nav-right a {
            color: #e8d5b7;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        nav .nav-right a:hover {
            color: #f4d03f;
            background: rgba(244, 208, 63, 0.1);
        }
        header {
            text-align: center;
            padding: 100px 20px 40px;
            position: relative;
            z-index: 1;
        }
        header h1 {
            font-size: 3rem;
            color: #f4d03f;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin-bottom: 15px;
        }
        header p {
            font-style: italic;
            font-size: 1.2rem;
            color: #bb8fce;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        .planets-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .planet {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            pointer-events: auto;
            box-shadow: 0 0 60px rgba(255,255,255,0.3), inset -20px -20px 40px rgba(0,0,0,0.4);
            transition: all 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }
        .planet.active {
            opacity: 1;
        }
        .planet:hover {
            transform: scale(1.1);
        }
        .planet-asteroide {
            width: 200px;
            height: 200px;
            left: 15%;
            top: 25%;
            background: radial-gradient(circle at 30% 30%, #f4a460, #cd853f 40%, #8b4513 100%);
            transform: translate(-500px, -300px) scale(0);
        }
        .planet-asteroide.active {
            transform: translate(0, 0) scale(1);
            animation: float1 6s ease-in-out infinite;
        }
        .planet-baobab {
            width: 180px;
            height: 180px;
            right: 20%;
            top: 30%;
            background: radial-gradient(circle at 35% 35%, #4a7c4e, #2d5a2e 50%, #1a3a1a 100%);
            transform: translate(600px, -400px) scale(0);
        }
        .planet-baobab.active {
            transform: translate(0, 0) scale(1);
            animation: float2 7s ease-in-out infinite;
        }
        .planet-pecora {
            width: 160px;
            height: 160px;
            left: 25%;
            bottom: 20%;
            background: radial-gradient(circle at 30% 30%, #e8e8e8, #c0c0c0 50%, #909090 100%);
            transform: translate(-600px, 500px) scale(0);
        }
        .planet-pecora.active {
            transform: translate(0, 0) scale(1);
            animation: float3 5s ease-in-out infinite;
        }
        .planet-lampione {
            width: 140px;
            height: 140px;
            right: 15%;
            bottom: 25%;
            background: radial-gradient(circle at 40% 40%, #fff8dc, #ffd700 50%, #daa520 100%);
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.6), 0 0 120px rgba(255, 165, 0, 0.4), inset -15px -15px 30px rgba(0,0,0,0.3);
            transform: translate(700px, 400px) scale(0);
        }
        .planet-lampione.active {
            transform: translate(0, 0) scale(1);
            animation: float4 8s ease-in-out infinite;
        }
        .planet-label {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: #f4d03f;
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.5s ease 0.5s;
        }
        .planet.active .planet-label {
            opacity: 1;
        }
        @keyframes float1 {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }
        @keyframes float2 {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(-5deg); }
        }
        @keyframes float3 {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }
        @keyframes float4 {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-15px) rotate(-2deg); }
            66% { transform: translateY(-25px) rotate(2deg); }
        }
        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 0.9rem;
            text-align: center;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div class="sky-bg" id="sky-bg"></div>
    <div class="stars" id="stars"></div>
    
    <nav>
        <div class="logo">Il Piccolo Principe</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="pilots.html">Sensori</a>
            <a href="webcam.html">Webcam</a>
            <a href="pianeti.html" class="active">Pianeti</a>
            <a href="chi-siamo.html">Chi siamo</a>
        </div>
        <div class="nav-right">
            <a href="login.html">Login</a>
        </div>
    </nav>
    
    <header>
        <h1>I Pianeti</h1>
        <p>"Conobbe dunque molti pianeti abitati da grandi persone"</p>
    </header>

    <div class="planets-container">
        <div class="planet planet-asteroide" id="asteroide">
            <span class="planet-label">L'Asteroide B-612</span>
        </div>
        <div class="planet planet-baobab" id="baobab">
            <span class="planet-label">Il Pianeta dei Baobab</span>
        </div>
        <div class="planet planet-pecora" id="pecora">
            <span class="planet-label">Il Pianeta della Pecora</span>
        </div>
        <div class="planet planet-lampione" id="lampione">
            <span class="planet-label">Il Pianeta del Lampione</span>
        </div>
    </div>

    <div class="instructions">
        L'amministratore puo controllare i pianeti dalla pagina Webcam
    </div>

    <script>
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 2 + 's';
            starsContainer.appendChild(star);
        }

        const socket = io();
        const skyBg = document.getElementById('sky-bg');

        socket.on('planet-activate', (data) => {
            const planet = document.getElementById(data.planet);
            if (planet) {
                planet.classList.add('active');
                checkDimBackground();
            }
        });

        socket.on('planet-deactivate', (data) => {
            const planet = document.getElementById(data.planet);
            if (planet) {
                planet.classList.remove('active');
                checkDimBackground();
            }
        });

        socket.on('planet-deactivate-all', () => {
            document.querySelectorAll('.planet').forEach(p => p.classList.remove('active'));
            skyBg.classList.remove('dimmed');
        });

        function checkDimBackground() {
            const anyActive = document.querySelector('.planet.active');
            if (anyActive) {
                skyBg.classList.add('dimmed');
            } else {
                skyBg.classList.remove('dimmed');
            }
        }
    </script>
</body>
</html>
